# Конфигурация Streamlit для запуска приложения
# Этот файл содержит настройки внешнего вида и поведения приложения

[server]
headless = true
enableCORS = true
enableXsrfProtection = true
address = "0.0.0.0"
port = 5000

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 5000

[theme]
# Фирменные цвета для приложения
primaryColor = "#004B9A"  # Синий
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[runner]
# Настройки для повышения производительности
magicEnabled = true
fastReruns = true

[logger]
level = "info"