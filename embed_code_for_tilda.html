<!-- Скрипт для размещения калькулятора пергол в блоке T123 на Tilda -->
<div id="pergola-calculator-container" style="width:100%; height:850px;">
    <iframe 
        id="pergola-calculator-frame" 
        src="https://YOUR-REPLIT-URL.replit.app" 
        style="width:100%; height:100%; border:none; overflow:hidden;" 
        allow="fullscreen"
        scrolling="yes">
    </iframe>
</div>

<script>
    // Адаптивная высота iframe для разных устройств
    document.addEventListener('DOMContentLoaded', function() {
        function adjustIframeHeight() {
            var iframe = document.getElementById('pergola-calculator-frame');
            var container = document.getElementById('pergola-calculator-container');
            
            // Определяем высоту на основе ширины экрана
            if (window.innerWidth < 768) {
                // Мобильные устройства
                container.style.height = '1100px';
            } else if (window.innerWidth < 992) {
                // Планшеты
                container.style.height = '950px';
            } else {
                // Настольные компьютеры
                container.style.height = '850px';
            }
        }
        
        // Вызываем функцию при загрузке и при изменении размера экрана
        adjustIframeHeight();
        window.addEventListener('resize', adjustIframeHeight);
    });
    
    // Обеспечение передачи сообщений между iframe и родительской страницей
    window.addEventListener('message', function(event) {
        // Убедитесь, что сообщения приходят только от вашего приложения
        if (event.origin !== 'https://YOUR-REPLIT-URL.replit.app') return;
        
        // Обработка сообщений от калькулятора
        // Например, прокрутка к результатам или изменение высоты
        if (event.data === 'scroll_to_results') {
            var iframe = document.getElementById('pergola-calculator-frame');
            iframe.contentWindow.postMessage('scroll_to_results', '*');
        }
        
        // Можно добавить другие типы сообщений при необходимости
        if (event.data.type === 'resize') {
            document.getElementById('pergola-calculator-container').style.height = event.data.height + 'px';
        }
    });
</script>

<!-- ИНСТРУКЦИИ ПО УСТАНОВКЕ:

1. Создайте блок HTML-кода (T123) на Tilda
2. Замените "YOUR-REPLIT-URL.replit.app" на фактический URL вашего приложения Replit
3. Вставьте этот код в блок T123
4. Сохраните и опубликуйте изменения на Tilda

Примечание: Если нужно, можно настроить стили контейнера для лучшей интеграции с дизайном Tilda.
Например, добавить отступы: 
style="width:100%; height:850px; padding: 20px 0;"

-->
