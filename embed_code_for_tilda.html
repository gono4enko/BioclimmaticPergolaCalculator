<!-- Код для встраивания калькулятора пергол на сайт Tilda -->
<!-- Версия 3.0 - Адаптивный дизайн для мобильных устройств, улучшенная прокрутка и автоматическая высота -->
<!-- ПРЯМАЯ ССЫЛКА НА ПРИЛОЖЕНИЕ: https://bioclimmatic-pergola-calculator-gono4enko.replit.app/ -->

<!-- Чтобы перейти напрямую к калькулятору, используйте ссылку: -->
<!-- <a href="https://bioclimmatic-pergola-calculator-gono4enko.replit.app/" target="_blank">Открыть калькулятор в новом окне</a> -->

<!-- Внешний контейнер для задания размеров и позиционирования -->
<div class="pergola-calculator-wrapper">
  <!-- Кнопка для прямого доступа к калькулятору (опционально) -->
  <a href="https://bioclimmatic-pergola-calculator-gono4enko.replit.app/" 
     target="_blank" 
     class="direct-link-button">
    Открыть калькулятор в новом окне
  </a>
  
  <!-- iframe с калькулятором -->
  <iframe 
    id="pergola-calculator" 
    src="https://bioclimmatic-pergola-calculator-gono4enko.replit.app/" 
    scrolling="no"
    title="Калькулятор стоимости пергол"
    allow="clipboard-read; clipboard-write"
  ></iframe>
</div>

<!-- Стили для адаптивного дизайна -->
<style>
  /* Контейнер для калькулятора */
  .pergola-calculator-wrapper {
    width: 100%;
    max-width: 1200px; /* Максимальная ширина на широких экранах */
    margin: 0 auto;
    overflow: hidden;
    box-sizing: border-box;
    padding: 0;
  }
  
  /* Стили для iframe */
  #pergola-calculator {
    width: 100%;
    min-height: 800px; /* Начальная минимальная высота */
    border: none;
    margin: 0;
    padding: 0;
    display: block;
    transition: height 0.3s ease; /* Плавное изменение высоты */
  }
  
  /* Стили для мобильных устройств */
  @media (max-width: 768px) {
    .pergola-calculator-wrapper {
      width: 100%;
      padding: 0;
    }
    
    #pergola-calculator {
      min-height: 1000px; /* Увеличенная начальная высота для мобильных */
      width: 100vw; /* Растягиваем на всю ширину экрана */
      max-width: none; /* Отключаем ограничение ширины */
      margin-left: -10px; /* Компенсируем отступы родительского контейнера */
      margin-right: -10px;
    }
  }
  
  /* Специальные стили для iPhone и других устройств с высоким DPI */
  @media screen and (-webkit-min-device-pixel-ratio: 2), 
         screen and (min-resolution: 192dpi) {
    #pergola-calculator {
      width: 100vw; /* Используем viewport width для полного заполнения */
      max-width: none;
      margin-left: -10px;
      margin-right: -10px;
    }
  }
  
  /* Стили для кнопки прямого доступа */
  .direct-link-button {
    display: inline-block;
    background-color: #0066cc;
    color: white;
    padding: 10px 20px;
    margin: 10px 0;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  
  .direct-link-button:hover {
    background-color: #0055aa;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transform: translateY(-2px);
  }
  
  /* Адаптивные стили для кнопки на мобильных устройствах */
  @media (max-width: 768px) {
    .direct-link-button {
      display: block;
      width: 100%;
      max-width: 90%;
      margin: 10px auto;
      padding: 12px 20px;
      font-size: 16px;
    }
  }
</style>

<!-- JavaScript для автоматической подстройки высоты iframe -->
<script>
  // Хранилище для последней полученной высоты
  let lastReceivedHeight = 0;
  let heightUpdateTime = 0;
  let iframeScrollTimeout = null;
  
  // Функция для плавного изменения высоты iframe
  function smoothlySetIframeHeight(newHeight, iframe) {
    // Если новая высота отличается существенно, применяем ее
    if (Math.abs(newHeight - lastReceivedHeight) > 20) {
      console.log("Применяем новую высоту:", newHeight);
      
      // Добавляем отступ для предотвращения скролла
      const heightWithPadding = newHeight + 50;
      
      // Применяем высоту с плавной анимацией
      iframe.style.height = heightWithPadding + "px";
      lastReceivedHeight = newHeight;
    }
  }
  
  // Получаем сообщения от iframe
  window.addEventListener("message", function(event) {
    // Проверяем, что сообщение от нашего калькулятора
    if (event.origin.startsWith("https://bioclimmatic-pergola-calculator-gono4enko.replit.app")) {
      const iframe = document.getElementById("pergola-calculator");
      
      // Обработка структурированного сообщения (объект)
      if (typeof event.data === 'object' && event.data !== null && 'height' in event.data) {
        // Получаем информацию из сообщения
        const receivedHeight = event.data.height;
        const needsScroll = event.data.needsScroll;
        const timestamp = event.data.timestamp || Date.now();
        
        // Предотвращаем обработку устаревших сообщений
        if (timestamp < heightUpdateTime) {
          console.log("Игнорируем устаревшее сообщение о высоте");
          return;
        }
        
        // Обновляем время последнего обновления
        heightUpdateTime = timestamp;
        
        // Применяем новую высоту
        smoothlySetIframeHeight(receivedHeight, iframe);
        
        console.log("Получены данные о высоте:", event.data);
      } 
      // Для совместимости со старым кодом, который отправляет просто число
      else if (typeof event.data === 'number') {
        const receivedHeight = event.data;
        smoothlySetIframeHeight(receivedHeight, iframe);
        console.log("Получено числовое значение высоты:", receivedHeight);
      }
    }
  });
  
  // Функция для обработки изменения размера окна
  function adjustIframeOnResize() {
    // Получаем текущую ширину окна
    const windowWidth = window.innerWidth;
    const iframe = document.getElementById("pergola-calculator");
    
    // Устанавливаем начальную высоту в зависимости от ширины устройства
    if (windowWidth <= 768) {
      iframe.style.minHeight = "1000px"; // Больше высоты для мобильных
    } else {
      iframe.style.minHeight = "800px"; // Стандартная высота для десктопов
    }
    
    // Сбрасываем отрицательные margin на больших экранах
    if (windowWidth > 768) {
      iframe.style.marginLeft = "0";
      iframe.style.marginRight = "0";
      iframe.style.width = "100%";
    } else {
      // Применяем отрицательные margin на мобильных для растягивания на всю ширину
      iframe.style.width = "100vw";
      
      // Определяем родительский padding для компенсации
      const containerPadding = 10; // Стандартный padding в блоках Tilda
      iframe.style.marginLeft = "-" + containerPadding + "px";
      iframe.style.marginRight = "-" + containerPadding + "px";
    }
    
    // Запрашиваем текущую высоту у iframe
    try {
      // Отправляем сообщение iframe с запросом высоты
      iframe.contentWindow.postMessage({
        type: "REQUEST_HEIGHT",
        timestamp: Date.now()
      }, "https://bioclimmatic-pergola-calculator-gono4enko.replit.app");
      console.log("Отправлен запрос высоты");
    } catch (e) {
      console.log("Не удалось отправить запрос высоты:", e);
    }
  }
  
  // Функция для периодической проверки размеров iframe
  function setupHeightMonitoring() {
    // Каждые 2 секунды проверяем, нужно ли обновить высоту
    const monitorInterval = setInterval(function() {
      try {
        const iframe = document.getElementById("pergola-calculator");
        
        // Если iframe загружен, запрашиваем текущую высоту
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({
            type: "REQUEST_HEIGHT",
            timestamp: Date.now()
          }, "https://bioclimmatic-pergola-calculator-gono4enko.replit.app");
        }
      } catch (e) {
        console.log("Ошибка мониторинга высоты:", e);
      }
    }, 2000);
    
    return monitorInterval;
  }
  
  // Функция для установки обработчиков событий прокрутки
  function setupScrollHandlers() {
    // При прокрутке отправляем сообщение iframe
    window.addEventListener("scroll", function() {
      // Используем throttling для уменьшения числа событий
      if (iframeScrollTimeout) return;
      
      iframeScrollTimeout = setTimeout(function() {
        try {
          const iframe = document.getElementById("pergola-calculator");
          const scrollPosition = window.scrollY;
          
          // Отправляем информацию о прокрутке родительского окна
          iframe.contentWindow.postMessage({
            type: "PARENT_SCROLL",
            scrollY: scrollPosition,
            timestamp: Date.now()
          }, "https://bioclimmatic-pergola-calculator-gono4enko.replit.app");
          
          iframeScrollTimeout = null;
        } catch (e) {
          console.log("Ошибка отправки события прокрутки:", e);
          iframeScrollTimeout = null;
        }
      }, 100);
    });
  }
  
  // Запускаем все обработчики при загрузке страницы
  window.addEventListener("load", function() {
    // Настраиваем iframe под размер устройства
    adjustIframeOnResize();
    
    // Запускаем мониторинг высоты
    const heightMonitor = setupHeightMonitoring();
    
    // Настраиваем обработчики прокрутки
    setupScrollHandlers();
    
    // Настраиваем обработчик изменения размера окна
    window.addEventListener("resize", function() {
      // Используем debouncing для предотвращения слишком частых вызовов
      clearTimeout(window.resizeTimeout);
      window.resizeTimeout = setTimeout(adjustIframeOnResize, 200);
    });
  });
  
  // Устанавливаем начальную высоту
  document.getElementById("pergola-calculator").style.height = 
    (window.innerWidth <= 768) ? "1000px" : "800px";
</script>
