<!-- Код для встраивания калькулятора пергол на сайт Tilda -->
<!-- Поместите этот код в блок T123 в качестве HTML/CSS кода -->

<!-- Версия 2.0 - Улучшенная прокрутка с автоматической адаптацией высоты -->

<!-- Контейнер и iframe для калькулятора -->
<iframe 
    id="biocalc" 
    src="https://bioclimmatic-pergola-calculator-gono4enko.replit.app/" 
    width="100%" 
    style="border:none;" 
    scrolling="no"
    title="Калькулятор стоимости пергол"
    allow="clipboard-read; clipboard-write"
></iframe>

<!-- JavaScript для автоматической подстройки высоты iframe -->
<script>
  window.addEventListener("message", function(event) {
    if (event.origin.startsWith("https://bioclimmatic-pergola-calculator-gono4enko.replit.app")) {
      // Если получили число - это высота iframe
      if (typeof event.data === 'number') {
        var iframe = document.getElementById("biocalc");
        // Добавляем небольшой запас (20px) для избежания двойной прокрутки
        iframe.style.height = (event.data + 20) + "px";
        console.log("Установлена новая высота iframe:", event.data + "px");
      }
    }
  }, false);
  
  // Устанавливаем начальную высоту, достаточную для первой загрузки
  document.getElementById("biocalc").style.height = "800px";
</script>

<!-- CSS для стилизации (опционально) -->
<style>
  #biocalc {
    max-width: 100%;
    margin: 0 auto;
    display: block;
    transition: height 0.3s ease; /* Плавное изменение высоты */
  }
</style>
