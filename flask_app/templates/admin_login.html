<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — Вход</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:12px;padding:40px 36px;box-shadow:0 2px 12px rgba(0,0,0,0.08);width:360px;text-align:center}
.login-card h1{font-size:20px;color:#1a3a6b;margin-bottom:6px}
.login-card p{font-size:13px;color:#888;margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;outline:none;margin-bottom:16px}
.login-card input:focus{border-color:#1a3a6b}
.login-card button{width:100%;padding:12px;background:#1a3a6b;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-card button:hover{background:#15305a}
.err{color:#e74c3c;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
<div class="login-card">
    <h1>Админ-панель</h1>
    <p>Управление ценами калькулятора</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST">
        <input type="password" name="password" placeholder="Пароль" autofocus required>
        <button type="submit">Войти</button>
    </form>
</div>
</body>
</html>
