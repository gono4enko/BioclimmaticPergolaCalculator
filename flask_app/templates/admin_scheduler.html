<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — Статус планировщика</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa}
.top-bar{background:#1a3a6b;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:18px;font-weight:700;margin:0}
.top-bar .nav-links{display:flex;gap:16px;align-items:center}
.top-bar a{color:rgba(255,255,255,.7);font-size:13px;text-decoration:none}
.top-bar a:hover{color:#fff}
.top-bar a.active{color:#fff;font-weight:600}
.main{max-width:900px;margin:20px auto;padding:0 16px}
.card{border:none;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:20px}
.card-header{background:#fff;border-bottom:1px solid #eee;font-weight:600;font-size:15px;padding:14px 20px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}
.status-indicator{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px}
.status-indicator.running{background:#d4edda;color:#155724}
.status-indicator.stopped{background:#f8d7da;color:#721c24}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-indicator.running .status-dot{background:#28a745}
.status-indicator.stopped .status-dot{background:#dc3545}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.metric-card{background:#f8f9fc;border-radius:8px;padding:16px;text-align:center}
.metric-card .label{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.metric-card .value{font-size:22px;font-weight:700;color:#1a3a6b}
.metric-card .sub{font-size:11px;color:#aaa;margin-top:4px}
.info-table{width:100%;border-collapse:collapse}
.info-table td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:14px}
.info-table td:first-child{color:#888;font-weight:600;width:200px}
.info-table td:last-child{color:#333}
.info-table tr:last-child td{border-bottom:none}
.refresh-btn{padding:6px 16px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#1a3a6b;font-weight:600;transition:.2s}
.refresh-btn:hover{background:#f0f4ff;border-color:#1a3a6b}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.auto-refresh-label{font-size:12px;color:#888;display:flex;align-items:center;gap:6px}
.last-updated{font-size:11px;color:#aaa;text-align:right;margin-top:12px}
.loading-overlay{text-align:center;padding:40px;color:#888}
.error-msg{background:#f8d7da;color:#721c24;padding:12px 16px;border-radius:8px;font-size:13px;margin-top:12px}
</style>
</head>
<body>

<div class="top-bar">
    <h1>Статус планировщика</h1>
    <div class="nav-links">
        <a href="{{ url_for('admin.prices_page') }}">Управление ценами</a>
        <a href="{{ url_for('admin.scheduler_page') }}" class="active">Планировщик</a>
        <a href="/">← Калькулятор</a>
        <a href="{{ url_for('admin.logout') }}">Выйти</a>
    </div>
</div>

<div class="main">

<div class="card">
    <div class="card-header">
        <span>Состояние планировщика</span>
        <div style="display:flex;align-items:center;gap:12px">
            <label class="auto-refresh-label">
                <input type="checkbox" id="autoRefresh" checked> Авто-обновление (30с)
            </label>
            <button class="refresh-btn" id="refreshBtn" onclick="loadStatus()">Обновить</button>
        </div>
    </div>
    <div class="card-body">
        <div id="statusContent">
            <div class="loading-overlay">Загрузка…</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">Статистика очистки</div>
    <div class="card-body">
        <div id="metricsContent">
            <div class="loading-overlay">Загрузка…</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">Параметры</div>
    <div class="card-body">
        <div id="configContent">
            <div class="loading-overlay">Загрузка…</div>
        </div>
    </div>
</div>

</div>

<script>
var autoRefreshTimer = null;

function loadStatus() {
    var btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = 'Обновление…';

    fetch('{{ url_for("admin.scheduler_status") }}')
        .then(function(r) {
            if (r.redirected || !r.ok) {
                throw new Error(r.status === 401 || r.redirected ? 'Сессия истекла. Перезайдите в админ-панель.' : 'Ошибка сервера (' + r.status + ')');
            }
            return r.json();
        })
        .then(function(d) {
            btn.disabled = false;
            btn.textContent = 'Обновить';

            if (!d.ok) {
                showError('Ошибка загрузки статуса');
                return;
            }

            renderStatus(d);
            renderMetrics(d);
            renderConfig(d);
        })
        .catch(function(e) {
            btn.disabled = false;
            btn.textContent = 'Обновить';
            showError(e.message || 'Ошибка соединения');
        });
}

function showError(msg) {
    document.getElementById('statusContent').innerHTML = '<div class="error-msg">' + msg + '</div>';
    document.getElementById('metricsContent').innerHTML = '<div class="loading-overlay">—</div>';
    document.getElementById('configContent').innerHTML = '<div class="loading-overlay">—</div>';
}

function renderStatus(d) {
    var running = d.scheduler_running;
    var statusClass = running ? 'running' : 'stopped';
    var statusText = running ? 'Работает' : 'Остановлен';

    var nextRun = d.next_run ? formatDateTime(d.next_run) : '—';
    var lastRun = d.last_run_time ? formatDateTime(d.last_run_time) : 'Ещё не запускался';

    var html = '<table class="info-table">';
    html += '<tr><td>Статус</td><td><span class="status-indicator ' + statusClass + '"><span class="status-dot"></span>' + statusText + '</span></td></tr>';
    html += '<tr><td>Последний запуск</td><td>' + lastRun + '</td></tr>';
    html += '<tr><td>Следующий запуск</td><td>' + nextRun + '</td></tr>';
    html += '</table>';
    html += '<div class="last-updated">Обновлено: ' + new Date().toLocaleTimeString('ru-RU') + '</div>';

    document.getElementById('statusContent').innerHTML = html;
}

function renderMetrics(d) {
    var html = '<div class="metric-grid">';

    html += '<div class="metric-card">';
    html += '<div class="label">Всего запусков</div>';
    html += '<div class="value">' + (d.total_runs || 0) + '</div>';
    html += '</div>';

    html += '<div class="metric-card">';
    html += '<div class="label">Файлов удалено (последний раз)</div>';
    html += '<div class="value">' + (d.last_files_removed !== null && d.last_files_removed !== undefined ? d.last_files_removed : '—') + '</div>';
    html += '</div>';

    html += '<div class="metric-card">';
    html += '<div class="label">Всего файлов удалено</div>';
    html += '<div class="value">' + (d.total_files_removed || 0) + '</div>';
    html += '</div>';

    html += '</div>';

    document.getElementById('metricsContent').innerHTML = html;
}

function renderConfig(d) {
    var interval = d.interval_hours ? d.interval_hours + ' ч' : '—';
    var retention = d.retention_days ? d.retention_days + ' дн' : '—';

    var html = '<table class="info-table">';
    html += '<tr><td>Интервал очистки</td><td>' + interval + '</td></tr>';
    html += '<tr><td>Срок хранения файлов</td><td>' + retention + '</td></tr>';
    html += '</table>';

    document.getElementById('configContent').innerHTML = html;
}

function formatDateTime(isoStr) {
    try {
        var dt = new Date(isoStr);
        if (isNaN(dt.getTime())) return isoStr;
        return dt.toLocaleString('ru-RU', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    } catch(e) {
        return isoStr;
    }
}

function setupAutoRefresh() {
    var checkbox = document.getElementById('autoRefresh');
    checkbox.addEventListener('change', function() {
        if (this.checked) {
            startAutoRefresh();
        } else {
            stopAutoRefresh();
        }
    });
    startAutoRefresh();
}

function startAutoRefresh() {
    stopAutoRefresh();
    autoRefreshTimer = setInterval(loadStatus, 30000);
}

function stopAutoRefresh() {
    if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
    }
}

loadStatus();
setupAutoRefresh();
</script>
</body>
</html>
