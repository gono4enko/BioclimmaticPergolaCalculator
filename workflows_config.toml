# Конфигурация рабочих процессов для запуска приложения
# Файл определяет команды, которые автоматически запускаются при старте проекта

[[run]]
name = "PergolaMasterServer"
command = "streamlit run app_basic.py --server.port 5000 --server.address 0.0.0.0 --logger.level info"
wait_for_port = 5000

[[run]]
name = "WebScraperService"
command = "python -m web_scraper --port 5001"